# Nginx configuration for FlexForBelsimpel
#
# Three server blocks:
#   1. Port 80 (external) — redirects browsers to HTTPS
#   2. Port 80 (internal) — serves GraphQL for Docker-internal traffic (Node SSR)
#   3. Port 443 (HTTPS) — serves the actual site with SSL encryption
#
# Why two port-80 blocks? When Node.js does SSR, it calls http://nginx/graphql
# inside the Docker network. That request arrives with Host: "nginx", not the
# domain name. We use the server_name to distinguish:
#   - Host: "forbelsimpel.chirilojoga.com" → redirect to HTTPS (browser)
#   - Host: "nginx" → serve GraphQL directly (Docker-internal, no SSL needed)

# External HTTP → redirect to HTTPS
server {
    listen 80;
    server_name forbelsimpel.chirilojoga.com;
    return 301 https://$host$request_uri;
}

# Internal HTTP — serves GraphQL for Docker-internal requests (Node SSR).
# Node calls http://nginx/graphql — the Host header is "nginx", which
# matches this block. No SSL needed inside the Docker network.
server {
    listen 80;
    server_name nginx;

    root /var/www/html/public;

    location /graphql {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name forbelsimpel.chirilojoga.com;

    ssl_certificate /etc/letsencrypt/live/forbelsimpel.chirilojoga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forbelsimpel.chirilojoga.com/privkey.pem;

    root /var/www/html/public;

    # --- BACKEND ROUTES ---
    location /graphql {
        try_files $uri /index.php?$query_string;
    }

    location /graphiql {
        try_files $uri /index.php?$query_string;
    }

    location /api/health {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # --- FRONTEND ROUTES ---
    location / {
        proxy_pass http://node:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
