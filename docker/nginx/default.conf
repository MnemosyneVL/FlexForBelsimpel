# Nginx configuration for FlexForBelsimpel
#
# Two server blocks:
#   1. Port 80 (HTTP) — redirects everything to HTTPS
#   2. Port 443 (HTTPS) — serves the actual site with SSL encryption
#
# Routes traffic to two backends:
#   /graphql, /graphiql → PHP-FPM (Laravel)
#   Everything else → Node.js (React Router v7)

# Redirect all HTTP traffic to HTTPS.
# Anyone visiting http://forbelsimpel.chirilojoga.com gets sent to https://
server {
    listen 80;
    server_name forbelsimpel.chirilojoga.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name forbelsimpel.chirilojoga.com;

    # SSL certificate files from Let's Encrypt (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/forbelsimpel.chirilojoga.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/forbelsimpel.chirilojoga.com/privkey.pem;

    # Where Laravel's public files live (for serving static assets)
    root /var/www/html/public;

    # --- BACKEND ROUTES ---
    location /graphql {
        try_files $uri /index.php?$query_string;
    }

    location /graphiql {
        try_files $uri /index.php?$query_string;
    }

    location /api/health {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # --- FRONTEND ROUTES ---
    location / {
        proxy_pass http://node:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
