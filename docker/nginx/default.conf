# Nginx configuration for FlexForBelsimpel
#
# This is a reverse proxy that routes traffic to two backends:
#   1. PHP-FPM (Laravel) — handles /graphql and /graphiql
#   2. Node.js (React Router v7) — handles everything else
#
# Why Nginx in front of both?
#   - Single entry point on port 80 (mapped to 8080 on host)
#   - Serves static files directly without bothering PHP or Node
#   - Can add SSL, gzip compression, and load balancing later

server {
    listen 80;
    server_name localhost;

    # Where Laravel's public files live (for serving static assets)
    root /var/www/html/public;

    # --- BACKEND ROUTES ---
    # Any request to /graphql goes to PHP-FPM (Laravel + Lighthouse)
    # This is where the React frontend fetches data from.
    location /graphql {
        try_files $uri /index.php?$query_string;
    }

    # GraphiQL is a browser-based IDE for testing GraphQL queries.
    # Useful for recruiters to explore the API interactively.
    location /graphiql {
        try_files $uri /index.php?$query_string;
    }

    # Laravel's health check endpoint
    location /api/health {
        try_files $uri /index.php?$query_string;
    }

    # FastCGI pass to PHP-FPM container.
    # This block actually sends PHP requests to the PHP container.
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # --- FRONTEND ROUTES ---
    # Everything else goes to the Node.js React Router v7 server.
    # proxy_pass means "forward this request to another server."
    location / {
        proxy_pass http://node:3000;
        proxy_http_version 1.1;

        # These headers are needed for WebSocket connections (hot module reload in dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Don't log requests for favicon — it just clutters the logs
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }
}
