; Custom PHP configuration for development.
;
; These settings are tuned for a dev environment — in production
; you'd increase memory limits and disable error display.

; Show all errors in development — we want to catch everything early
display_errors = On
error_reporting = E_ALL

; 256MB is plenty for a development environment
memory_limit = 256M

; Allow large file uploads (phone images could be big)
upload_max_filesize = 50M
post_max_size = 50M

; Set timezone to Netherlands (where Belsimpel is based)
date.timezone = Europe/Amsterdam
